<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0d1b2a"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#C9A84C" stroke-width="0.75"/>

  <!-- N/S main points (taller) -->
  <polygon points="16,3 17.8,14.2 16,13 14.2,14.2" fill="#C9A84C"/>
  <polygon points="16,29 17.8,17.8 16,19 14.2,17.8" fill="#9A7A34"/>

  <!-- E/W main points -->
  <polygon points="29,16 17.8,14.2 19,16 17.8,17.8" fill="#9A7A34"/>
  <polygon points="3,16 14.2,14.2 13,16 14.2,17.8" fill="#9A7A34"/>

  <!-- NE / NW / SE / SW diagonal minor points -->
  <polygon points="25.2,6.8 17.5,14 18.5,12.5 20,11.5" fill="#C9A84C" opacity="0.55"/>
  <polygon points="6.8,6.8 14.5,14 13.5,12.5 12,11.5"  fill="#C9A84C" opacity="0.55"/>
  <polygon points="25.2,25.2 17.5,18 18.5,19.5 20,20.5" fill="#C9A84C" opacity="0.55"/>
  <polygon points="6.8,25.2 14.5,18 13.5,19.5 12,20.5"  fill="#C9A84C" opacity="0.55"/>

  <!-- Center jewel -->
  <circle cx="16" cy="16" r="2.2" fill="#C9A84C"/>
  <circle cx="16" cy="16" r="1"   fill="#0d1b2a"/>

  <!-- N label -->
  <text x="16" y="10.5" text-anchor="middle" font-size="3.5"
    font-family="Georgia, serif" font-weight="bold" fill="#C9A84C">N</text>
</svg>
